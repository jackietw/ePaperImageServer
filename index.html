<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Paper Image Tools</title>
    <link rel="stylesheet" href="assets/css/style.css?v=2">
    <!-- Cropper.js CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
</head>

<body>
    <div class="glass-container">
        <header style="position: relative;">
            <div class="hamburger-menu" id="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <h1>E-Paper Image Tools</h1>
            <p>6-Color Dithering & Resizing</p>
            <nav class="main-nav">
                <a href="index.html" class="nav-btn active">Upload Image</a>
                <a href="admin.html" class="nav-btn">Manage Image</a>
            </nav>
        </header>

        <main>
            <div class="upload-section" id="upload-section">
                <input type="file" id="image-upload" accept="image/*,.heic" hidden>
                <label for="image-upload" class="upload-label">
                    <div class="upload-icon">📁</div>
                    <span id="upload-text">Upload Image</span>
                </label>
            </div>

            <div class="editor-section hidden" id="editor-section">
                <div class="workspace">
                    <div class="canvas-container">
                        <img id="image-workspace" src="" alt="Workspace">
                    </div>
                    <div class="controls">
                        <div class="toolbar">
                            <button id="rotate-btn" class="icon-btn" title="Rotate 90 degrees">↻ Rotate 90
                                degrees</button>
                            <button id="reset-btn" class="icon-btn" title="Reset Settings">↺ Reset Settings</button>
                            <button id="restart-btn" class="icon-btn danger-btn" title="Upload New Image">✕ Upload New
                                Image</button>
                        </div>
                        <div class="control-group">
                            <label>Output Size</label>
                            <div class="radio-group">
                                <label><input type="radio" name="ratio" value="landscape" checked> 800 x 480</label>
                                <label><input type="radio" name="ratio" value="portrait"> 480 x 800</label>
                            </div>
                        </div>

                        <div class="control-group">
                            <label>Dithering</label>
                            <div class="radio-group">
                                <label><input type="radio" name="dithering_algo" value="floyd" checked>
                                    Floyd-Steinberg</label>
                                <label><input type="radio" name="dithering_algo" value="stucki"> Stucki</label>
                                <label><input type="radio" name="dithering_algo" value="atkinson"> Atkinson</label>
                                <label><input type="radio" name="dithering_algo" value="yliluoma"> Joel Yliluoma</label>
                                <label><input type="radio" name="dithering_algo" value="bluenoise"> Blue Noise</label>
                            </div>
                        </div>

                        <div class="control-group">
                            <label for="saturation">Saturation: <span id="sat-val">0</span></label>
                            <input type="range" id="saturation" min="-100" max="100" value="0">
                        </div>

                        <div class="control-group">
                            <label for="contrast">Contrast: <span id="con-val">0</span></label>
                            <input type="range" id="contrast" min="-100" max="100" value="0">
                        </div>

                        <button id="process-btn" class="primary-btn">Apply 6-Color Dithering</button>
                    </div>
                </div>
            </div>

            <div class="result-section hidden" id="result-section">
                <h2>Preview</h2>
                <div class="result-preview">
                    <canvas id="result-canvas"></canvas>
                </div>
                <div class="actions">
                    <button id="back-btn" class="secondary-btn">Back to Edit</button>
                    <button id="upload-server-btn" class="primary-btn">Save</button>
                </div>
                <p id="upload-status"></p>
            </div>
        </main>
    </div>

    <!-- Cropper.js JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <!-- HEIC to JPEG converter -->
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <script src="assets/js/script.js"></script>
    <!-- footer -->
    <footer style="position: fixed; bottom: 0; left: 0; width: 100%; text-align: center; padding: 10px;">
        <p>@2026 E-Paper Upload Website by Jackie | Version 1.1</p>
    </footer>
</body>

</html>
